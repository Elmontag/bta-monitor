server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Rate-limit zone: max 20 req/s per IP for /data/ (burst allows short spikes)
    limit_req_zone $binary_remote_addr zone=data_limit:10m rate=20r/s;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header Referrer-Policy         "strict-origin"  always;

    # Persistent cache files written by cache-service
    location /data/ {
        alias /data/;

        # Prevent search engines from indexing raw JSON dumps
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "public, max-age=300" always;

        # Rate limiting — allow bursts up to 40 requests, then enforce 20 r/s
        limit_req zone=data_limit burst=40 nodelay;

        try_files $uri =404;
    }

    # SPA fallback — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
